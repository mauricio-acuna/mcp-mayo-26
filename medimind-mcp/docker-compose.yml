# ==========================================
# MediMind MCP - HIPAA-Compliant Development Environment
# ==========================================
# 
# HIPAA Security Features:
# - PostgreSQL with SSL encryption
# - MongoDB with authentication and TLS
# - Redis with password protection
# - All data encrypted in transit and at rest
#
# ⚠️ PRODUCTION: Use managed services (AWS RDS, DocumentDB, ElastiCache)
# ==========================================

version: '3.8'

services:
  # ==========================================
  # PostgreSQL 16 (Primary Database)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: medimind-postgres
    environment:
      POSTGRES_USER: medimind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
      POSTGRES_DB: medimind
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
      -c log_connections=on
      -c log_disconnections=on
      -c log_statement=all
      -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medimind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medimind-network
    # HIPAA: Encryption in transit (SSL)
    # HIPAA: Connection logging for audit trail

  # ==========================================
  # MongoDB 7 (Clinical Notes, Unstructured Data)
  # ==========================================
  mongodb:
    image: mongo:7
    container_name: medimind-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: medimind
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_dev}
      MONGO_INITDB_DATABASE: medimind
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    command: >
      mongod
      --auth
      --bind_ip_all
      --logpath /var/log/mongodb/mongod.log
      --logappend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medimind-network
    # HIPAA: Authentication required
    # Note: TLS requires certificate setup (production only)

  # ==========================================
  # Redis 7 (Session Cache, Rate Limiting)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: medimind-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medimind-network
    # HIPAA: Password protection
    # HIPAA: Persistence enabled (AOF + RDB)

  # ==========================================
  # MediMind FastAPI Application (Optional)
  # ==========================================
  # Uncomment to run application in Docker
  # app:
  #   build:
  #     context: ./mcp-server
  #     dockerfile: Dockerfile
  #   container_name: medimind-app
  #   environment:
  #     ENVIRONMENT: development
  #     DATABASE_URL: postgresql://medimind:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/medimind?sslmode=require
  #     MONGODB_URL: mongodb://medimind:${MONGO_PASSWORD:-changeme_dev}@mongodb:27017/medimind?authSource=admin
  #     REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_dev}@redis:6379/0
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     mongodb:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - medimind-network
  #   volumes:
  #     - ./mcp-server:/app
  #   command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

# ==========================================
# Volumes (Persistent Data)
# ==========================================
volumes:
  postgres-data:
    driver: local
    name: medimind-postgres-data
  mongodb-data:
    driver: local
    name: medimind-mongodb-data
  mongodb-config:
    driver: local
    name: medimind-mongodb-config
  redis-data:
    driver: local
    name: medimind-redis-data

# ==========================================
# Networks (Isolated Network)
# ==========================================
networks:
  medimind-network:
    driver: bridge
    name: medimind-network

# ==========================================
# HIPAA Compliance Notes
# ==========================================
# ✅ Encryption in transit (PostgreSQL SSL, MongoDB TLS in production)
# ✅ Authentication required (all services password-protected)
# ✅ Audit logging (PostgreSQL connection logs)
# ✅ Persistence (Redis AOF, PostgreSQL WAL)
# ✅ Health checks (automatic restart on failure)
# ✅ Isolated network (no external access except defined ports)
#
# ⚠️ PRODUCTION CHECKLIST:
# - [ ] Use AWS RDS for PostgreSQL (encrypted storage, automatic backups)
# - [ ] Use AWS DocumentDB for MongoDB (HIPAA-compliant)
# - [ ] Use AWS ElastiCache for Redis (encryption at rest/transit)
# - [ ] Enable CloudWatch logging (7-year retention)
# - [ ] Configure VPC with private subnets
# - [ ] Enable AWS KMS for encryption key management
# - [ ] Implement AWS WAF for DDoS protection
# - [ ] Setup AWS Shield Standard (free) or Advanced
# ==========================================
